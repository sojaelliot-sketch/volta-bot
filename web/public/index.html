<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOLTA · Manager</title>
<style>
  :root{
    --ink:#0a0a0a; --paper:#ffffff; --line:#0a0a0a; --muted:#6b6b6b;
    --soft:#f2f2f2; --shadow:6px 6px 0 var(--ink);
  }
  [data-theme="dark"]{
    --ink:#f4f4f4; --paper:#0c0c0c; --line:#f4f4f4; --muted:#9a9a9a;
    --soft:#1a1a1a; --shadow:6px 6px 0 var(--ink);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.45;transition:background .35s,color .35s}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 20px 100px}
  header{display:flex;align-items:center;justify-content:space-between;
    border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:26px;flex-wrap:wrap;gap:12px}
  .brand{font-weight:800;letter-spacing:.22em;font-size:14px;text-transform:uppercase}
  .brand b{font-weight:800}
  .topright{display:flex;gap:10px;align-items:center;font-size:13px}
  .btn{font:inherit;cursor:pointer;border:2px solid var(--line);background:var(--ink);color:var(--paper);
    padding:9px 16px;border-radius:999px;font-weight:700;letter-spacing:.04em;transition:.18s}
  .btn:hover{transform:translateY(-1px);box-shadow:4px 4px 0 var(--line)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:var(--paper)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .iconbtn{width:40px;height:40px;border-radius:999px;border:2px solid var(--line);background:transparent;
    color:var(--ink);cursor:pointer;font-size:16px;transition:.18s}
  .iconbtn:hover{background:var(--ink);color:var(--paper)}
  .login{min-height:80vh;display:flex;align-items:center;justify-content:center;animation:fade .5s}
  .card{border:2px solid var(--line);border-radius:22px;padding:40px 34px;width:380px;max-width:100%;
    box-shadow:var(--shadow);animation:rise .5s}
  .card h1{font-size:23px;letter-spacing:.03em;margin-bottom:6px}
  .card p{color:var(--muted);font-size:13px;margin-bottom:22px}
  .field{width:100%;border:2px solid var(--line);border-radius:12px;padding:13px 14px;font:inherit;
    font-size:15px;outline:none;margin-bottom:14px;background:var(--paper);color:var(--ink);transition:.18s}
  .field:focus{box-shadow:4px 4px 0 var(--line)}
  .err{color:var(--ink);background:var(--soft);border:1px solid var(--line);padding:9px 12px;
    border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:30px}
  .stat{border:2px solid var(--line);border-radius:14px;padding:14px;transition:.2s;animation:rise .5s}
  .stat:hover{transform:translateY(-3px);box-shadow:4px 4px 0 var(--line)}
  .stat .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-size:21px;font-weight:800;margin-top:4px}
  .stat .v.small{font-size:16px}
  .sec-title{display:flex;align-items:center;justify-content:space-between;gap:10px;
    border-bottom:2px solid var(--line);padding-bottom:8px;margin:30px 0 16px;flex-wrap:wrap}
  .sec-title h2{font-size:15px;letter-spacing:.14em;text-transform:uppercase}
  .xi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .slot{border:2px dashed var(--line);border-radius:14px;min-height:120px;padding:10px;
    display:flex;flex-direction:column;justify-content:space-between}
  .slot.empty{align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  .pc{border:2px solid var(--line);border-radius:14px;padding:12px;background:var(--paper);
    display:flex;flex-direction:column;gap:8px;transition:.18s;cursor:pointer;animation:rise .45s}
  .pc:hover{box-shadow:4px 4px 0 var(--line);transform:translate(-1px,-2px)}
  .pc .nm{font-weight:700;font-size:14px;display:flex;justify-content:space-between;gap:8px}
  .pc .rid{font-size:11px;color:var(--muted)}
  .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);
    border-radius:999px;padding:2px 7px;white-space:nowrap}
  .bench{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .mini{font-size:11px;border:1px solid var(--line);border-radius:8px;padding:3px 7px;background:var(--soft)}
  .bar{height:8px;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper)}
  .bar > i{display:block;height:100%;background:var(--ink);width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .lb{width:100%;border-collapse:collapse;font-size:13px}
  .lb th,.lb td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left}
  .lb th{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .lb tr:hover{background:var(--soft)}
  .hidden{display:none!important}
  .muted{color:var(--muted)}
  .timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:18px;display:flex;flex-direction:column;gap:16px}
  .tl-item{position:relative;animation:rise .45s}
  .tl-item::before{content:"";position:absolute;left:-25px;top:4px;width:12px;height:12px;border-radius:50%;
    border:2px solid var(--line);background:var(--paper)}
  .tl-card{border:2px solid var(--line);border-radius:14px;padding:14px;transition:.2s}
  .tl-card:hover{box-shadow:4px 4px 0 var(--line)}
  .score{font-size:18px;font-weight:800;letter-spacing:.04em}
  .badge{font-size:10px;font-weight:800;letter-spacing:.1em;border:2px solid var(--line);border-radius:999px;padding:2px 9px}
  .bw{background:var(--ink);color:var(--paper)}
  .bl{background:transparent;color:var(--ink)}
  .bd{border-style:dashed}
  .rankbar{height:10px;border:2px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper);margin-top:8px}
  .rankbar > i{display:block;height:100%;background:var(--ink);width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:50;animation:fade .25s}
  .modal .box{border:2px solid var(--line);border-radius:20px;background:var(--paper);max-width:440px;width:100%;
    padding:26px;box-shadow:var(--shadow);animation:rise .3s;max-height:88vh;overflow:auto;position:relative}
  .modal .box h3{font-size:19px;margin-bottom:2px}
  .statline{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .statline .s{border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .statline .s .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .statline .s .n{font-size:16px;font-weight:800}
  .closex{position:absolute;top:14px;right:16px;cursor:pointer;font-size:20px;border:none;background:none;color:var(--ink)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);border:2px solid var(--line);padding:11px 18px;border-radius:999px;
    font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:820px){.stats{grid-template-columns:repeat(3,1fr)}.xi{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <section id="login" class="login">
    <div class="card">
      <div class="brand" style="margin-bottom:18px"><b>MΞTΛ • WORKS</b></div>
      <h1>Manager Login</h1>
      <p>Enter your team name and the password you set in the bot with <span class="mono">!password</span>.</p>
      <div class="err" id="loginErr"></div>
      <input class="field mono" id="uname" type="text" placeholder="team name (e.g. Oasis FC)" autocomplete="off" />
      <input class="field mono" id="pw" type="password" placeholder="your password" autocomplete="off" />
      <button class="btn" id="loginBtn" style="width:100%">Enter</button>
    </div>
  </section>

  <section id="dash" class="hidden">
    <header>
      <div>
        <div class="brand"><b>MΞTΛ • WORKS</b></div>
        <div id="teamName" style="font-size:18px;font-weight:800;margin-top:6px"></div>
      </div>
      <div class="topright">
        <button class="iconbtn" id="themeBtn" title="Toggle theme">◐</button>
        <button class="btn ghost" id="renameBtn">Rename</button>
        <button class="btn ghost" id="lbBtn">Leaders</button>
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="sec-title"><h2>Starting XI</h2><span class="muted mono" id="xiCount"></span></div>
    <div class="xi" id="xi"></div>

    <div class="sec-title"><h2>Substitutes</h2><button class="btn" id="saveBtn">Save squad</button></div>
    <div class="bench" id="bench"></div>

    <div class="sec-title"><h2>Full Roster</h2><span class="muted" id="rosterCount"></span></div>
    <div class="roster" id="roster"></div>

    <div class="sec-title"><h2>📜 Match History</h2></div>
    <div class="timeline" id="history"></div>

    <div class="sec-title"><h2>🏆 Top Players</h2></div>
    <div class="roster" id="topPlayers"></div>
  </section>

  <section id="lbView" class="hidden">
    <header>
      <div class="brand"><b>MΞTΛ • WORKS</b></div>
      <button class="btn" id="lbBack">Back</button>
    </header>
    <div class="sec-title"><h2>Leaderboard · Top 20 MMR</h2></div>
    <table class="lb">
      <thead><tr><th>#</th><th>Manager</th><th>MMR</th><th>W</th><th>L</th><th>D</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </section>
</div>

<div id="modal" class="modal hidden">
  <div class="box">
    <button class="closex" id="modalClose">✕</button>
    <div id="modalBody"></div>
  </div>
</div>
<div id="toast"></div>

<script id="appscript">
const $ = (id) => document.getElementById(id);
let TOKEN = localStorage.getItem('volta_token') || null;
let ME = null;

// ── BACKEND URL (set once to your tunnel / VPS where web/server.js runs) ──
const API_BASE = "https://footpad-cobbler-attempt.ngrok-free.dev";

function apiBase(){ return API_BASE && API_BASE.trim() ? API_BASE.replace(/\/$/, '') : window.location.origin; }
function show(id){ document.querySelectorAll('#login,#dash,#lbView').forEach(s=>s.classList.add('hidden')); $(id).classList.remove('hidden'); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

async function api(path, opts={}){
  const res = await fetch(apiBase() + path, Object.assign({headers:{'Content-Type':'application/json'}}, opts));
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'request failed');
  return data;
}

const RANKS = [
  {label:'Bronze',min:0},{label:'Silver',min:1100},{label:'Gold',min:1300},
  {label:'Platinum',min:1500},{label:'Diamond',min:1700},{label:'Master',min:1900},{label:'Legend',min:2100}
];
function rankInfo(mmr){
  let cur=RANKS[0], next=RANKS[1];
  for(let i=0;i<RANKS.length;i++){ if(mmr>=RANKS[i].min){ cur=RANKS[i]; next=RANKS[i+1]; } }
  const lo=cur.min, hi=next?next.min:cur.min+200;
  const pct = next ? Math.max(0,Math.min(100, Math.round(((mmr-lo)/(hi-lo))*100))) : 100;
  return { cur:cur.label, next: next?next.label:null, pct };
}

function bar(v){ const p=Math.max(0,Math.min(100,v)); return `<div class="bar"><i data-w="${p}"></i></div>`; }
function rarityTag(r){ return `<span class="tag">${r}</span>`; }
function posTag(p){ return `<span class="tag">${p||'—'}</span>`; }

function animateNum(el, to, dur=800){
  const from=0, start=performance.now();
  function step(t){ const k=Math.min(1,(t-start)/dur); const v=Math.round(from+(to-from)*(1-Math.pow(1-k,3)));
    el.textContent=v.toLocaleString(); if(k<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function fillBars(scope){ (scope||document).querySelectorAll('.bar > i[data-w]').forEach(i=>{ i.style.width=i.dataset.w+'%'; }); }

// ── login ──
$('loginBtn').onclick = async () => {
  const uname=$('uname').value.trim(), pw=$('pw').value;
  $('loginErr').style.display='none';
  try{
    const { token, user } = await api('/api/login', {method:'POST', body:JSON.stringify({name:uname, password:pw})});
    TOKEN=token; localStorage.setItem('volta_token', token); ME=user; renderDash(); loadExtra(); show('dash');
  }catch(e){ $('loginErr').textContent=e.message; $('loginErr').style.display='block'; }
};
$('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') $('loginBtn').click(); });
$('uname').addEventListener('keydown', e=>{ if(e.key==='Enter') $('pw').focus(); });
$('logoutBtn').onclick = () => { TOKEN=null; localStorage.removeItem('volta_token'); show('login'); };

// ── theme ──
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('volta_theme', t); }
$('themeBtn').onclick = () => { const cur=document.documentElement.getAttribute('data-theme'); applyTheme(cur==='dark'?'light':'dark'); };
applyTheme(localStorage.getItem('volta_theme') || 'light');

// ── dashboard ──
function renderDash(){
  $('teamName').textContent = ME.name;
  const ri = rankInfo(ME.mmr);
  const streak = ME.streak || 0;
  const stats = [
    ['Balance', ME.currency, true],
    ['MMR', ME.mmr, false],
    ['Rank', ri.cur, false],
    ['Form', `${ME.wins}W·${ME.losses}L·${ME.draws}D`, false],
    ['Squad Power', ME.squadPower || 0, false],
    [streak>0?`${streak}🔥 Streak`:'Streak', streak>0?streak:0, false],
  ];
  $('stats').innerHTML = stats.map(([k,v,big])=>`
    <div class="stat"><div class="k">${k}</div>
    <div class="v ${big?'':'small'}" data-num="${typeof v==='number'?v:''}">${typeof v==='number'?v.toLocaleString():v}</div></div>`).join('');
  const rb = `<div class="stat" style="grid-column:span 6;border-style:dashed">
      <div class="k">RANK JOURNEY · ${ri.cur}${ri.next?` → ${ri.next}`:''}</div>
      <div class="rankbar"><i data-w="${ri.pct}"></i></div>
      <div class="muted" style="font-size:11px;margin-top:6px">${ri.pct}% to ${ri.next||'top rank'}</div></div>`;
  const tv = `<div class="stat" style="grid-column:span 6">
      <div class="k">TEAM VALUE (est.)</div>
      <div class="v" data-num="${ME.teamValue||0}">${(ME.teamValue||0).toLocaleString()}</div></div>`;
  $('stats').insertAdjacentHTML('beforeend', tv + rb);
  $('stats').querySelectorAll('[data-num]').forEach(el=>{ const n=+el.dataset.num; if(n) animateNum(el,n); });
  setTimeout(()=>fillBars($('stats')), 60);

  const map = Object.fromEntries(ME.roster.map(p=>[p.id,p]));
  const xi = ME.startingXI.filter(id=>map[id]);
  const subs = [...ME.bench, ...ME.reserves].filter(id=>map[id]);
  $('xiCount').textContent = `${xi.length}/4`;
  $('xi').innerHTML = xi.length ? xi.map(id=>playerCard(map[id],'xi')).join('') : `<div class="slot empty">No players in XI</div>`;
  $('bench').innerHTML = subs.length ? subs.map(id=>playerCard(map[id],'bench')).join('') : `<div class="muted">No substitutes.</div>`;
  $('rosterCount').textContent = `${ME.roster.length} players`;
  $('roster').innerHTML = ME.roster.slice().sort((a,b)=>b.total-a.total).map(p=>playerCard(p,'roster')).join('');
  setTimeout(()=>fillBars(document), 60);
}

function statLine(p){
  const s=p.stats;
  if(p.role==='goalkeeper') return `REF ${s.reflex} · POS ${s.positioning} · ANT ${s.anticipation} · STR ${s.strength} · COM ${s.composure}`;
  return `PAC ${s.pace} · SKL ${s.skill} · SHO ${s.shooting} · STA ${s.stamina} · COM ${s.composure}`;
}
function playerCard(p, where){
  const moveBtn = where==='xi'
    ? `<button class="btn ghost" data-move="${p.id}" data-to="bench">→ Bench</button>`
    : `<button class="btn ghost" data-move="${p.id}" data-to="xi">→ XI</button>`;
  const detail = where==='roster'
    ? `<div class="row"><span class="mini">Lv.${p.level}</span><span class="mini">Total ${p.total}</span>${posTag(p.position)}${rarityTag(p.rarity)}</div>
       <div class="row" style="margin-top:6px"><span class="mono" style="font-size:11px">${statLine(p)}</span></div>
       <div style="margin-top:6px">${bar(p.condition)}<div class="rid" style="margin-top:3px">Condition ${p.condition}%</div></div>`
    : `<div class="row"><span class="mini">Total ${p.total}</span>${posTag(p.position)}${rarityTag(p.rarity)}</div>`;
  return `<div class="pc" data-pid="${p.id}">
    <div class="nm"><span>${p.name}</span><span class="rid mono">${p.id}</span></div>
    ${detail}
    ${where!=='roster' ? `<div class="row">${moveBtn}</div>` : ''}
  </div>`;
}

// player modal + squad moves
document.addEventListener('click', async (e)=>{
  const card = e.target.closest('.pc[data-pid]');
  if(card && !e.target.closest('[data-move]')){ openPlayer(card.dataset.pid); return; }
  const mv = e.target.closest('[data-move]');
  if(mv){
    const id=mv.dataset.move, to=mv.dataset.to;
    const map=Object.fromEntries(ME.roster.map(p=>[p.id,p]));
    let xi=ME.startingXI.filter(x=>map[x]); let subs=[...ME.bench,...ME.reserves].filter(x=>map[x]);
    if(to==='xi'){ if(!xi.includes(id)){ if(xi.length>=4) subs.push(xi.shift()); xi.push(id);} subs=subs.filter(x=>x!==id); }
    else { if(!subs.includes(id)) subs.push(id); xi=xi.filter(x=>x!==id); }
    ME.startingXI=xi; ME.bench=subs; ME.reserves=[]; renderDash(); return;
  }
});

async function openPlayer(pid){
  const p = ME.roster.find(x=>x.id===pid); if(!p) return;
  const s=p.stats;
  const rows = p.role==='goalkeeper'
    ? [['Reflex',s.reflex],['Positioning',s.positioning],['Anticipation',s.anticipation],['Strength',s.strength],['Composure',s.composure]]
    : [['Pace',s.pace],['Skill',s.skill],['Shooting',s.shooting],['Stamina',s.stamina],['Composure',s.composure]];
  $('modalBody').innerHTML = `
    <h3>${p.name}</h3>
    <div class="row" style="margin-top:4px"><span class="mini">Lv.${p.level}</span><span class="mini">${p.position}</span>${rarityTag(p.rarity)}<span class="mini">ID ${p.id}</span></div>
    <div class="statline">
      ${rows.map(([l,n])=>`<div class="s"><div class="l">${l}</div><div class="n">${n}</div>${bar(Math.round(n/99*100))}</div>`).join('')}
    </div>
    <div class="row" style="margin-top:14px"><span class="mini">Total ${p.total}</span><span class="mini">Condition ${p.condition}%</span><span class="mini">Form ${p.form}</span></div>`;
  $('modal').classList.remove('hidden');
  fillBars($('modalBody'));
}
$('modalClose').onclick = ()=> $('modal').classList.add('hidden');
$('modal').addEventListener('click', e=>{ if(e.target===$('modal')) $('modal').classList.add('hidden'); });

// ── squad save ──
$('saveBtn').onclick = async () => {
  $('saveBtn').disabled=true;
  try{
    const { user } = await api('/api/squad', {method:'POST', body:JSON.stringify({token:TOKEN, startingXI:ME.startingXI, bench:ME.bench})});
    ME=user; renderDash(); toast('Squad saved ✓');
  }catch(e){ alert(e.message); }
  finally{ $('saveBtn').disabled=false; }
};

// ── rename ──
$('renameBtn').onclick = async () => {
  const name=prompt('New team name:', ME.name); if(!name) return;
  try{ const { user } = await api('/api/rename', {method:'POST', body:JSON.stringify({token:TOKEN, name})}); ME=user; renderDash(); toast('Renamed ✓'); }
  catch(e){ alert(e.message); }
};

// ── leaderboard ──
$('lbBtn').onclick = async () => {
  try{ const { board } = await api('/api/leaderboard');
    $('lbBody').innerHTML = board.map(r=>`<tr><td>${r.rank}</td><td>${r.name}</td><td>${r.mmr}</td><td>${r.wins}</td><td>${r.losses}</td><td>${r.draws}</td></tr>`).join('');
    show('lbView');
  }catch(e){ alert(e.message); }
};
$('lbBack').onclick = () => show('dash');

// ── match history + top players ──
async function loadExtra(){
  try{
    const { matches } = await api('/api/history');
    $('history').innerHTML = matches.length ? matches.map(m=>{
      const badge = m.result==='W'?'<span class="badge bw">W</span>':m.result==='L'?'<span class="badge bl">L</span>':'<span class="badge bd">D</span>';
      const scorers = (m.goalScorers||[]).map(g=>`${g.minute}' ${g.player}`).join('  ·  ') || '—';
      const mvp = m.mvp?`⭐ ${m.mvp.name}`:'';
      const d = new Date(m.date); const ds = d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      return `<div class="tl-item"><div class="tl-card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div class="score">${m.homeName} ${m.homeScore}–${m.awayScore} ${m.awayName}</div>${badge}</div>
        <div class="muted" style="font-size:12px;margin-top:4px">${ds}</div>
        <div class="row" style="margin-top:6px"><span class="mini">⚽ ${scorers}</span></div>
        ${mvp?`<div class="row"><span class="mini">${mvp}</span></div>`:''}
      </div></div>`;
    }).join('') : `<div class="muted">No matches yet — go play with <span class="mono">!play</span> in WhatsApp!</div>`;
  }catch(e){ $('history').innerHTML = `<div class="muted">History unavailable.</div>`; }

  try{
    const { players } = await api('/api/topplayers');
    $('topPlayers').innerHTML = players.map(p=>`
      <div class="pc"><div class="nm"><span>${p.name}</span><span class="rid mono">${p.id}</span></div>
        <div class="row"><span class="mini">OVR ${p.ovr}</span>${posTag(p.position)}${rarityTag(p.rarity)}</div>
        <div class="row"><span class="mini">⚽ ${p.goals}G</span><span class="mini">⭐ ${p.motm} MOTM</span></div></div>`).join('');
  }catch(e){ $('topPlayers').innerHTML = `<div class="muted">Top players unavailable.</div>`; }
}

// ── boot ──
(async function boot(){
  if(TOKEN){ try{ const { user } = await api('/api/me?token='+TOKEN); ME=user; renderDash(); loadExtra(); show('dash'); return; }
    catch{ TOKEN=null; localStorage.removeItem('volta_token'); } }
  show('login');
})();
</script>
</body>
</html>
