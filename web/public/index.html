<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOLTA · Manager</title>
<style>
  :root{
    --ink:#0a0a0a; --paper:#ffffff; --line:#0a0a0a; --muted:#6b6b6b;
    --soft:#f2f2f2; --shadow:0 1px 0 var(--ink);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.4;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 20px 80px}
  /* header */
  header{display:flex;align-items:center;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:28px}
  .brand{font-weight:800;letter-spacing:.22em;font-size:14px;text-transform:uppercase}
  .brand b{font-weight:800}
  .topright{display:flex;gap:14px;align-items:center;font-size:13px}
  .btn{
    font:inherit;cursor:pointer;border:2px solid var(--ink);background:var(--ink);color:var(--paper);
    padding:9px 16px;border-radius:999px;font-weight:700;letter-spacing:.04em;transition:.15s;
  }
  .btn:hover{background:var(--paper);color:var(--ink)}
  .btn.ghost{background:var(--paper);color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:var(--paper)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  /* login */
  .login{min-height:78vh;display:flex;align-items:center;justify-content:center}
  .card{border:2px solid var(--ink);border-radius:20px;padding:38px 34px;width:380px;max-width:100%;
    box-shadow:6px 6px 0 var(--ink)}
  .card h1{font-size:22px;letter-spacing:.04em;margin-bottom:6px}
  .card p{color:var(--muted);font-size:13px;margin-bottom:22px}
  .field{width:100%;border:2px solid var(--ink);border-radius:12px;padding:13px 14px;font:inherit;
    font-size:15px;outline:none;margin-bottom:14px;background:var(--paper)}
  .field:focus{box-shadow:4px 4px 0 var(--ink)}
  .err{color:#0a0a0a;background:var(--soft);border:1px solid var(--ink);padding:9px 12px;
    border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
  /* stat row */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:30px}
  .stat{border:2px solid var(--ink);border-radius:14px;padding:14px;text-align:left}
  .stat .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-size:22px;font-weight:800;margin-top:4px}
  /* sections */
  .sec-title{display:flex;align-items:center;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin:30px 0 16px}
  .sec-title h2{font-size:15px;letter-spacing:.14em;text-transform:uppercase}
  /* pitch / xi */
  .xi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .slot{border:2px dashed var(--ink);border-radius:14px;min-height:120px;padding:10px;
    display:flex;flex-direction:column;justify-content:space-between}
  .slot.empty{align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  /* player card */
  .pc{border:2px solid var(--ink);border-radius:14px;padding:12px;background:var(--paper);
    display:flex;flex-direction:column;gap:8px;transition:.15s}
  .pc:hover{box-shadow:4px 4px 0 var(--ink);transform:translate(-1px,-1px)}
  .pc .nm{font-weight:700;font-size:14px;display:flex;justify-content:space-between;gap:8px}
  .pc .rid{font-size:11px;color:var(--muted)}
  .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--ink);
    border-radius:999px;padding:2px 7px;white-space:nowrap}
  .bench{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .mini{font-size:11px;border:1px solid var(--ink);border-radius:8px;padding:3px 7px;background:var(--soft)}
  .bar{height:8px;border:1px solid var(--ink);border-radius:999px;overflow:hidden;background:var(--paper)}
  .bar > i{display:block;height:100%;background:var(--ink)}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .lb{width:100%;border-collapse:collapse;font-size:13px}
  .lb th,.lb td{border-bottom:1px solid var(--ink);padding:9px 10px;text-align:left}
  .lb th{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .lb tr:hover{background:var(--soft)}
  .hidden{display:none!important}
  .muted{color:var(--muted)}
  .right{text-align:right}
  @media(max-width:720px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .xi{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- LOGIN -->
  <section id="login" class="login">
    <div class="card">
      <div class="brand" style="margin-bottom:18px"><b>MΞTΛ • WORKS</b></div>
      <h1>Manager Login</h1>
      <p>Enter your team name and the password you set in the bot with <span class="mono">!password</span>.</p>
      <div class="err" id="loginErr"></div>
      <input class="field mono" id="uname" type="text" placeholder="team name (e.g. Oasis FC)" autocomplete="off" />
      <input class="field mono" id="pw" type="password" placeholder="your password" autocomplete="off" />
      <button class="btn" id="loginBtn" style="width:100%">Enter</button>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dash" class="hidden">
    <header>
      <div>
        <div class="brand"><b>MΞTΛ • WORKS</b></div>
        <div id="teamName" style="font-size:18px;font-weight:800;margin-top:6px"></div>
      </div>
      <div class="topright">
        <button class="btn ghost" id="renameBtn">Rename</button>
        <button class="btn ghost" id="lbBtn">Leaderboard</button>
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="sec-title"><h2>Starting XI</h2><span class="muted mono" id="xiCount"></span></div>
    <div class="xi" id="xi"></div>

    <div class="sec-title"><h2>Substitutes</h2><button class="btn" id="saveBtn">Save squad</button></div>
    <div class="bench" id="bench"></div>

    <div class="sec-title"><h2>Full Roster</h2><span class="muted" id="rosterCount"></span></div>
    <div class="roster" id="roster"></div>
  </section>

  <!-- LEADERBOARD -->
  <section id="lbView" class="hidden">
    <header>
      <div class="brand"><b>MΞTΛ • WORKS</b></div>
      <button class="btn" id="lbBack">Back</button>
    </header>
    <div class="sec-title"><h2>Leaderboard · Top 20 MMR</h2></div>
    <table class="lb">
      <thead><tr><th>#</th><th>Manager</th><th>MMR</th><th>W</th><th>L</th><th>D</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </section>
</div>

<script>
const $ = (id) => document.getElementById(id);
let TOKEN = localStorage.getItem('volta_token') || null;
let ME = null;

// ── BACKEND URL ───────────────────────────────────────────────────────────────
// When you host this page on GitHub Pages, set API_BASE to your backend's public
// URL (the tunnel / VPS where web/server.js runs). When served by web/server.js
// itself, leave it as "" and it falls back to the page's own origin.
// This is the ONLY place you configure the backend — no link field in the UI.
const API_BASE = "https://two-trees-clap.loca.lt";

function apiBase(){
  if (API_BASE && API_BASE.trim()) return API_BASE.replace(/\/$/, '');
  return window.location.origin;
}

function show(id){ document.querySelectorAll('#login,#dash,#lbView').forEach(s=>s.classList.add('hidden')); $(id).classList.remove('hidden'); }

async function api(path, opts={}){
  const res = await fetch(apiBase() + path, Object.assign({headers:{'Content-Type':'application/json'}}, opts));
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'request failed');
  return data;
}

function bar(v){ const p = Math.max(0, Math.min(100, v)); return `<div class="bar"><i style="width:${p}%"></i></div>`; }
function rarityTag(r){ return `<span class="tag">${r}</span>`; }
function posTag(p){ return `<span class="tag">${p||'—'}</span>`; }

// ── login ──
$('loginBtn').onclick = async () => {
  const uname = $('uname').value.trim();
  const pw = $('pw').value;
  $('loginErr').style.display='none';
  try{
    const { token, user } = await api('/api/login', {method:'POST', body:JSON.stringify({name:uname, password:pw})});
    TOKEN = token; localStorage.setItem('volta_token', token); ME = user;
    renderDash(); show('dash');
  }catch(e){ $('loginErr').textContent = e.message; $('loginErr').style.display='block'; }
};
$('pw').addEventListener('keydown', e => { if(e.key==='Enter') $('loginBtn').click(); });
$('uname').addEventListener('keydown', e => { if(e.key==='Enter') $('pw').focus(); });

$('logoutBtn').onclick = () => { TOKEN=null; localStorage.removeItem('volta_token'); show('login'); };

// ── dashboard render ──
function renderDash(){
  $('teamName').textContent = ME.name;
  $('stats').innerHTML = [
    ['Balance', ME.currency.toLocaleString()],
    ['MMR', ME.mmr],
    ['Rank', ME.rank],
    ['Form', `${ME.wins}W · ${ME.losses}L · ${ME.draws}D`],
    ['Win %', ME.winRate + '%'],
  ].map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

  const map = Object.fromEntries(ME.roster.map(p=>[p.id,p]));
  const xi = ME.startingXI.filter(id=>map[id]);
  const subs = [...ME.bench, ...ME.reserves].filter(id=>map[id]);

  $('xiCount').textContent = `${xi.length}/4`;
  $('xi').innerHTML = xi.length ? xi.map(id=>playerCard(map[id], 'xi')).join('')
    : `<div class="slot empty">No players in XI</div>`;

  $('bench').innerHTML = subs.length ? subs.map(id=>playerCard(map[id], 'bench')).join('')
    : `<div class="muted">No substitutes.</div>`;

  $('rosterCount').textContent = `${ME.roster.length} players`;
  $('roster').innerHTML = ME.roster
    .slice().sort((a,b)=>b.total-a.total)
    .map(p=>playerCard(p,'roster')).join('');
}

function statLine(p){
  const s = p.stats;
  if(p.role==='goalkeeper') return `REF ${s.reflex} · POS ${s.positioning} · ANT ${s.anticipation} · STR ${s.strength} · COM ${s.composure}`;
  return `PAC ${s.pace} · SKL ${s.skill} · SHO ${s.shooting} · STA ${s.stamina} · COM ${s.composure}`;
}

function playerCard(p, where){
  const moveBtn = where==='xi'
    ? `<button class="btn ghost" data-move="${p.id}" data-to="bench">→ Bench</button>`
    : `<button class="btn ghost" data-move="${p.id}" data-to="xi">→ XI</button>`;
  const detail = where==='roster'
    ? `<div class="row"><span class="mini">Lv.${p.level}</span><span class="mini">Total ${p.total}</span>${posTag(p.position)}${rarityTag(p.rarity)}</div>
       <div class="row" style="margin-top:6px"><span class="mono" style="font-size:11px">${statLine(p)}</span></div>
       <div style="margin-top:6px">${bar(p.condition)}<div class="rid" style="margin-top:3px">Condition ${p.condition}%</div></div>`
    : `<div class="row"><span class="mini">Total ${p.total}</span>${posTag(p.position)}${rarityTag(p.rarity)}</div>`;
  return `<div class="pc">
    <div class="nm"><span>${p.name}</span><span class="rid mono">${p.id}</span></div>
    ${detail}
    ${where!=='roster' ? `<div class="row">${moveBtn}</div>` : ''}
  </div>`;
}

// ── squad moves (local, saved on Save) ──
document.addEventListener('click', async (e)=>{
  const mv = e.target.closest('[data-move]');
  if(mv){
    const id = mv.dataset.move, to = mv.dataset.to;
    const map = Object.fromEntries(ME.roster.map(p=>[p.id,p]));
    let xi = ME.startingXI.filter(x=>map[x]);
    let subs = [...ME.bench, ...ME.reserves].filter(x=>map[x]);
    if(to==='xi'){
      if(!xi.includes(id)){ if(xi.length>=4){ subs.push(xi.shift()); } xi.push(id); }
      subs = subs.filter(x=>x!==id);
    } else {
      if(!subs.includes(id)) subs.push(id);
      xi = xi.filter(x=>x!==id);
    }
    ME.startingXI = xi; ME.bench = subs; ME.reserves = [];
    renderDash();
  }
});

$('saveBtn').onclick = async () => {
  $('saveBtn').disabled = true;
  try{
    const { user } = await api('/api/squad', {method:'POST', body:JSON.stringify({token:TOKEN, startingXI:ME.startingXI, bench:ME.bench})});
    ME = user; renderDash();
  }catch(e){ alert(e.message); }
  finally{ $('saveBtn').disabled=false; }
};

// ── rename ──
$('renameBtn').onclick = async () => {
  const name = prompt('New team name:', ME.name);
  if(!name) return;
  try{
    const { user } = await api('/api/rename', {method:'POST', body:JSON.stringify({token:TOKEN, name})});
    ME = user; renderDash();
  }catch(e){ alert(e.message); }
};

// ── leaderboard ──
$('lbBtn').onclick = async () => {
  try{
    const { board } = await api('/api/leaderboard');
    $('lbBody').innerHTML = board.map(r=>`<tr><td>${r.rank}</td><td>${r.name}</td><td>${r.mmr}</td><td>${r.wins}</td><td>${r.losses}</td><td>${r.draws}</td></tr>`).join('');
    show('lbView');
  }catch(e){ alert(e.message); }
};
$('lbBack').onclick = () => show('dash');

// ── boot ──
(async function boot(){
  if(TOKEN){
    try{ const { user } = await api('/api/me?token='+TOKEN); ME = user; renderDash(); show('dash'); return; }
    catch{ TOKEN=null; localStorage.removeItem('volta_token'); }
  }
  show('login');
})();
</script>
</body>
</html>
